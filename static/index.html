<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Code Translator</title>
</head>
<body>
  <h1>Code Translator</h1>
  <p>Paste code, then pick who you're explaining it to.</p>

  <textarea id="code" rows="12" cols="80" placeholder="Paste your code here..."></textarea>

  <div id="buttons">
    <button data-audience="engineer">Engineer</button>
    <button data-audience="pm">Product Manager</button>
    <button data-audience="executive">Executive</button>
  </div>

  <h2>Explanation</h2>
  <div id="output">Your explanation will appear here.</div>

  <script src="/static/app.js"></script>
</body>
</html>
